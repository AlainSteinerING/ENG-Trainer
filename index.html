<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f0e" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="English Trainer" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>English Trainer · Don Carne</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">
        <div class="logo">EN</div>
        <div>
          <div class="brand-title">English Trainer</div>
          <div class="brand-sub" id="streak-info">0 gelernt heute</div>
        </div>
      </div>
      <button id="menu-btn" class="icon-btn" aria-label="Menü">⋯</button>
    </header>

    <nav id="tabs">
      <button class="tab-btn active" data-view="learn">Lernen</button>
      <button class="tab-btn" data-view="dialogues">Dialoge</button>
      <button class="tab-btn" data-view="categories">Themen</button>
      <button class="tab-btn" data-view="manage">Verwalten</button>
      <button class="tab-btn" data-view="stats">Stats</button>
    </nav>

    <main id="content"></main>

    <!-- Modals -->
    <div id="modal-root"></div>
  </div>

  <script src="content-loader.js?v=4"></script>
  <script src="app.js?v=4"></script>
  <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
      });
    }
  </script>
</body>
</html>
